name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: PYTHONPATH=src python -m web_security_posture_auditor.cli --headers-json sample_data/headers.json --url https://demo.local --out docs/examples/example_web_security_report.md
